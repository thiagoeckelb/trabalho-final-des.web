<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HyperCars</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Porsche+Next:wght@100;200;300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style2.css">
  </head>
<body>
    <!-- NAV -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary" style="height: 65px;font-weight: 400;letter-spacing: 0px;">
        <div class="container-fluid">
          <a class="navbar-brand" href="#" style="font-weight: 300;"><img src="./img/logo01.png" style="width: 100px;margin-top: 5px;"> HYPERCARS</a>
          
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav" class="nav-itens">
                <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Início</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Marcas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Modelos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Serviços</a>
                </li>
                </ul>
            </div>
           
        </div>
    </nav>
    <!-- BANNER -->
    <section class="mx-carousel">

        <div class="mx-carousel-wrapper">
      
          <div class="mx-slides">
      
            <div class="mx-slide active">
              <a href="#"><img src="./img/lamborghini/lamborghini-aventador01.jpg"></a>
              <div class="mx-overlay"></div>

              <div class="mx-content">
                <h2>Aventador</h2>
                <p>...</p>
              </div>
            </div>
      
            <div class="mx-slide">
              <a href="#"><img src="./img/lamborghini/lamborghini-aventador02.jpg"></a>
              <div class="mx-overlay"></div>
      
              <div class="mx-content">
                <h2>Aventador</h2>
                <p>...</p>
              </div>
            </div>

            <div class="mx-slide">
                <a href="#"><img src="./img/lamborghini/lamborghini-aventador03.jpg"></a>
                <div class="mx-overlay"></div>
        
                <div class="mx-content">
                  <h2>Aventador</h2>
                  <p>...</p>
                </div>
              </div>
      
          </div>
      
          <div class="mx-controls">
            <button class="mx-btn prev">&#10094;</button>
            <button class="mx-btn next">&#10095;</button>
          </div>
      
          <div class="mx-indicators"></div>
      
        </div>

      </section>
        <script>
            const slides = document.querySelectorAll(".mx-slide");
            const slidesContainer = document.querySelector(".mx-slides");
            const indicators = document.querySelector(".mx-indicators");
        
            let currentIndex = 0;
            let autoSlide;
        
            slides.forEach((_, index) => {
              const dot = document.createElement("div");
              dot.classList.add("dot");
        
              if(index === 0) dot.classList.add("active");
        
              dot.addEventListener("click", () => {
                currentIndex = index;
                updateCarousel();
                resetAutoSlide();
              });
        
              indicators.appendChild(dot);
            });
        
            const dots = document.querySelectorAll(".dot");
        
            function updateCarousel() {
              slidesContainer.style.transform =
                `translateX(-${currentIndex * 100}%)`;
        
              slides.forEach(slide => slide.classList.remove("active"));
              slides[currentIndex].classList.add("active");
        
              dots.forEach(dot => dot.classList.remove("active"));
              dots[currentIndex].classList.add("active");
            }
        
            document.querySelector(".next").addEventListener("click", () => {
              currentIndex = (currentIndex + 1) % slides.length;
              updateCarousel();
              resetAutoSlide();
            });
        
            document.querySelector(".prev").addEventListener("click", () => {
              currentIndex =
                (currentIndex - 1 + slides.length) % slides.length;
        
              updateCarousel();
              resetAutoSlide();
            });
        
            function startAutoSlide() {
              autoSlide = setInterval(() => {
                currentIndex = (currentIndex + 1) % slides.length;
                updateCarousel();
              }, 5000);
            }
        
            function resetAutoSlide() {
              clearInterval(autoSlide);
              startAutoSlide();
            }
        
            startAutoSlide();
        </script>
</body>
</html>
