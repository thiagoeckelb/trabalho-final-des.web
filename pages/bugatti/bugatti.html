        <script>
            const slides = document.querySelectorAll(".mx-slide");
            const slidesContainer = document.querySelector(".mx-slides");
            const indicators = document.querySelector(".mx-indicators");
        
            let currentIndex = 0;
            let autoSlide;
        
            slides.forEach((_, index) => {
              const dot = document.createElement("div");
              dot.classList.add("dot");
        
              if(index === 0) dot.classList.add("active");
        
              dot.addEventListener("click", () => {
                currentIndex = index;
                updateCarousel();
                resetAutoSlide();
              });
        
              indicators.appendChild(dot);
            });
        
            const dots = document.querySelectorAll(".dot");
        
            function updateCarousel() {
              slidesContainer.style.transform =
                `translateX(-${currentIndex * 100}%)`;
        
              slides.forEach(slide => slide.classList.remove("active"));
              slides[currentIndex].classList.add("active");
        
              dots.forEach(dot => dot.classList.remove("active"));
              dots[currentIndex].classList.add("active");
            }
        
            document.querySelector(".next").addEventListener("click", () => {
              currentIndex = (currentIndex + 1) % slides.length;
              updateCarousel();
              resetAutoSlide();
            });
        
            document.querySelector(".prev").addEventListener("click", () => {
              currentIndex =
                (currentIndex - 1 + slides.length) % slides.length;
        
              updateCarousel();
              resetAutoSlide();
            });
        
            function startAutoSlide() {
              autoSlide = setInterval(() => {
                currentIndex = (currentIndex + 1) % slides.length;
                updateCarousel();
              }, 5000);
            }
        
            function resetAutoSlide() {
              clearInterval(autoSlide);
              startAutoSlide();
            }
        
            startAutoSlide();

            function toggleMenu() {
            document.getElementById('hcDrawer').classList.toggle('open');
            }
        </script>
